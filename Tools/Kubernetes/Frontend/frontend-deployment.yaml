apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: teerapatchr04/serverinventory-frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: frontend-env
